name: flutter_gpu_texture_renderer
description: Local fallback plugin used to keep DaFu Remote desktop builds working without GPU texture acceleration.
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: FlutterGpuTextureRendererPluginCApi
