name: DaFu Remote macOS ARM64

on:
  workflow_call:
    inputs:
      upload_release:
        type: boolean
        required: false
        default: false
      tag_name:
        type: string
        required: false
        default: ""

env:
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: dafu-macos-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dafu-macos-arm64:
    name: Build DaFu Remote macOS ARM64
    runs-on: macos-15

    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use crates.io sparse index in CI
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path(".cargo/config.toml")
          text = path.read_text(encoding="utf-8").replace("\r\n", "\n")
          text = text.replace(
              '[source.crates-io]\nreplace-with = "rsproxy-sparse"\n\n[source.rsproxy-sparse]\nregistry = "sparse+https://rsproxy.cn/index/"\n',
              '[source.crates-io]\nregistry = "sparse+https://index.crates.io/"\n',
          )
          path.write_text(text, encoding="utf-8", newline="\n")
          print(path.read_text(encoding="utf-8"))
          PY

      - name: Install build runtime
        shell: bash
        run: |
          brew install llvm create-dmg
          if ! command -v pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

      - name: Install NASM 2.16.x
        shell: bash
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          if [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]]; then
            git apply "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          fi

      - name: Work around Flutter scheduler issue
        shell: bash
        run: |
          cd "$(dirname "$(which flutter)")"
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin
          components: rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-arm64

      - name: Install Flutter Rust Bridge codegen
        shell: bash
        run: |
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked
          pushd flutter
          flutter pub get
          popd

      - name: Generate Flutter Rust Bridge bindings
        shell: bash
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! "$VCPKG_ROOT/vcpkg" install --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r file; do
              echo "${file}:"
              echo "======"
              cat "${file}"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-arm64-osx-rel-out.log" || true

      - name: Build DaFu Remote for Apple Silicon
        shell: bash
        run: |
          MIN_MACOS_VERSION="12.3"
          sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
          sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
          sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
          sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          python3 ./build.py --flutter --hwcodec --unix-file-copy-paste --screencapturekit

      - name: Prepare app bundle alias
        shell: bash
        run: |
          APP_DIR="./flutter/build/macos/Build/Products/Release"
          if [[ -d "${APP_DIR}/DaFu Remote.app" && ! -e "${APP_DIR}/RustDesk.app" ]]; then
            ln -s "DaFu Remote.app" "${APP_DIR}/RustDesk.app"
          fi
          if [[ -d "${APP_DIR}/RustDesk.app" && ! -e "${APP_DIR}/DaFu Remote.app" ]]; then
            ln -s "RustDesk.app" "${APP_DIR}/DaFu Remote.app"
          fi
          ls -la "${APP_DIR}"

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(python3 -c "from pathlib import Path; print(next(line.split('=')[1].strip().strip('\"') for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines() if line.startswith('version')))" )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create unsigned DMG
        shell: bash
        run: |
          APP_DIR="./flutter/build/macos/Build/Products/Release"
          APP_NAME="DaFu Remote.app"
          CREATE_DMG="$(command -v create-dmg)"
          create-dmg \
            --volname "DaFu Remote Installer" \
            --icon "${APP_NAME}" 200 190 \
            --hide-extension "${APP_NAME}" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "DaFuRemote-${{ steps.version.outputs.version }}-macos-arm64.dmg" \
            "${APP_DIR}/${APP_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaFuRemote-macos-arm64
          path: DaFuRemote-${{ steps.version.outputs.version }}-macos-arm64.dmg

      - name: Publish release asset
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (inputs.upload_release == true && inputs.tag_name != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: DaFuRemote-${{ steps.version.outputs.version }}-macos-arm64.dmg
