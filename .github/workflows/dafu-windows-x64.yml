name: DaFu Remote Windows x64

on:
  workflow_call:
    inputs:
      upload_release:
        type: boolean
        required: false
        default: false
      tag_name:
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      upload_release:
        type: boolean
        description: Upload built files to a GitHub Release
        required: false
        default: false
      tag_name:
        description: Release tag used when upload_release=true
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "[0-9]*"

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_TRIPLET: "x64-windows-static"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: dafu-windows-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dafu-windows-x64:
    name: Build DaFu Remote Windows x64
    runs-on: windows-2022

    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch hwcodec externals
        shell: pwsh
        run: |
          $externalsPath = ".\vendor\hwcodec\externals"
          if (Test-Path (Join-Path $externalsPath "MediaSDK_22.5.4")) {
            Write-Host "hwcodec externals already present."
            exit 0
          }
          if (Test-Path $externalsPath) {
            Remove-Item -LiteralPath $externalsPath -Recurse -Force
          }
          git clone --depth 1 https://github.com/rustdesk-org/externals.git $externalsPath

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Use crates.io sparse index in CI
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path(".cargo/config.toml")
          text = path.read_text(encoding="utf-8").replace("\r\n", "\n")
          text = text.replace(
              '[source.crates-io]\nreplace-with = "rsproxy-sparse"\n\n[source.rsproxy-sparse]\nregistry = "sparse+https://rsproxy.cn/index/"\n',
              '[source.crates-io]\nregistry = "sparse+https://index.crates.io/"\n',
          )
          path.write_text(text, encoding="utf-8", newline="\n")
          print(path.read_text(encoding="utf-8"))
          '@ | python -

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          if [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]]; then
            git apply "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Install Flutter Rust Bridge codegen
        shell: pwsh
        run: |
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked
          Push-Location .\flutter
          flutter pub get
          Pop-Location

      - name: Generate Flutter Rust Bridge bindings
        shell: pwsh
        run: |
          $codegen = Join-Path $env:USERPROFILE ".cargo\bin\flutter_rust_bridge_codegen.exe"
          & $codegen `
            --rust-input .\src\flutter_ffi.rs `
            --dart-output .\flutter\lib\generated_bridge.dart `
            --c-output .\flutter\macos\Runner\bridge_generated.h
          Copy-Item -LiteralPath .\flutter\macos\Runner\bridge_generated.h -Destination .\flutter\ios\Runner\bridge_generated.h -Force

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-x64

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $env:VCPKG_DEFAULT_HOST_TRIPLET = '${{ env.VCPKG_TRIPLET }}'
          $vcpkg = Join-Path $env:VCPKG_ROOT 'vcpkg.exe'
          & $vcpkg install --triplet $env:VCPKG_TRIPLET --x-install-root="$env:VCPKG_ROOT\installed"
          if ($LASTEXITCODE -ne 0) {
            Get-ChildItem -Path $env:VCPKG_ROOT -Recurse -Filter *.log -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "$($_.FullName):"
              Write-Host "======"
              Get-Content $_.FullName
              Write-Host "======"
            }
            exit $LASTEXITCODE
          }

      - name: Build DaFu Remote for Windows
        shell: pwsh
        run: |
          python .\build.py --flutter --hwcodec --vram

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path .\Cargo.toml -Pattern '^version\s*=\s*"(.+)"$').Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare release files
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Copy-Item -LiteralPath ".\DaFuRemotePortable.exe" -Destination ".\DaFuRemote-$version-portable.exe" -Force
          Get-Item ".\DaFuRemote-$version-install.exe", ".\DaFuRemote-$version-portable.exe" | Select-Object Name, Length, LastWriteTime

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DaFuRemote-windows-x64
          path: |
            DaFuRemote-${{ steps.version.outputs.version }}-install.exe
            DaFuRemote-${{ steps.version.outputs.version }}-portable.exe

      - name: Publish release assets
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (inputs.upload_release == true && inputs.tag_name != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            DaFuRemote-${{ steps.version.outputs.version }}-install.exe
            DaFuRemote-${{ steps.version.outputs.version }}-portable.exe
