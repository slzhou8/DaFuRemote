name: DaFu Remote Unified Release

on:
  workflow_dispatch:
    inputs:
      upload_release:
        type: boolean
        description: Upload artifacts to a GitHub Release
        required: false
        default: false
      tag_name:
        description: Tag name used for release publishing, such as v1.4.8
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

concurrency:
  group: dafu-unified-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows-x64:
    name: Windows x64
    uses: ./.github/workflows/dafu-windows-x64.yml
    with:
      upload_release: ${{ startsWith(github.ref, 'refs/tags/') || (inputs.upload_release && inputs.tag_name != '') }}
      tag_name: ${{ inputs.tag_name || github.ref_name }}

  build-macos-arm64:
    name: macOS ARM64
    uses: ./.github/workflows/dafu-macos-arm64.yml
    with:
      upload_release: ${{ startsWith(github.ref, 'refs/tags/') || (inputs.upload_release && inputs.tag_name != '') }}
      tag_name: ${{ inputs.tag_name || github.ref_name }}

  build-android-arm64:
    name: Android ARM64
    uses: ./.github/workflows/dafu-android-arm64.yml
    with:
      upload_release: ${{ startsWith(github.ref, 'refs/tags/') || (inputs.upload_release && inputs.tag_name != '') }}
      tag_name: ${{ inputs.tag_name || github.ref_name }}
