name: DaFu Remote Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional release tag. Leave empty to use v<version> from Cargo.toml.
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: dafu-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(python3 -c "from pathlib import Path; print(next(line.split('=')[1].strip().strip('\"') for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines() if line.startswith('version')))" )"
          TAG_NAME="${{ inputs.tag_name }}"
          if [[ -z "${TAG_NAME}" ]]; then
            TAG_NAME="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create or update release shell
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: DaFu Remote ${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build-windows-x64:
    name: Windows x64
    needs: prepare-release
    runs-on: windows-2022
    env:
      RUST_VERSION: "1.75"
      FLUTTER_VERSION: "3.24.5"
      LLVM_VERSION: "15.0.6"
      CARGO_EXPAND_VERSION: "1.0.95"
      FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
      VCPKG_TRIPLET: "x64-windows-static"
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch hwcodec externals
        shell: pwsh
        run: |
          $externalsPath = ".\vendor\hwcodec\externals"
          if (Test-Path (Join-Path $externalsPath "MediaSDK_22.5.4")) {
            Write-Host "hwcodec externals already present."
            exit 0
          }
          if (Test-Path $externalsPath) {
            Remove-Item -LiteralPath $externalsPath -Recurse -Force
          }
          git clone --depth 1 https://github.com/rustdesk-org/externals.git $externalsPath

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Use crates.io sparse index in CI
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path(".cargo/config.toml")
          text = path.read_text(encoding="utf-8").replace("\r\n", "\n")
          text = text.replace(
              '[source.crates-io]\nreplace-with = "rsproxy-sparse"\n\n[source.rsproxy-sparse]\nregistry = "sparse+https://rsproxy.cn/index/"\n',
              '[source.crates-io]\nregistry = "sparse+https://index.crates.io/"\n',
          )
          path.write_text(text, encoding="utf-8", newline="\n")
          print(path.read_text(encoding="utf-8"))
          '@ | python -

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          PATCH_FILE="${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if git apply --check "${PATCH_FILE}" >/dev/null 2>&1; then
            git apply "${PATCH_FILE}"
            echo "Applied Flutter dropdown menu patch."
          else
            echo "Flutter dropdown menu patch is not needed or not compatible with Flutter ${{ env.FLUTTER_VERSION }}, skipping."
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Install Flutter Rust Bridge codegen
        shell: pwsh
        run: |
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked
          Push-Location .\flutter
          flutter pub get
          Pop-Location

      - name: Generate Flutter Rust Bridge bindings
        shell: pwsh
        run: |
          $codegen = Join-Path $env:USERPROFILE ".cargo\bin\flutter_rust_bridge_codegen.exe"
          & $codegen `
            --rust-input .\src\flutter_ffi.rs `
            --dart-output .\flutter\lib\generated_bridge.dart `
            --c-output .\flutter\macos\Runner\bridge_generated.h
          Copy-Item -LiteralPath .\flutter\macos\Runner\bridge_generated.h -Destination .\flutter\ios\Runner\bridge_generated.h -Force

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-x64

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $env:VCPKG_DEFAULT_HOST_TRIPLET = '${{ env.VCPKG_TRIPLET }}'
          $vcpkg = Join-Path $env:VCPKG_ROOT 'vcpkg.exe'
          & $vcpkg install --triplet $env:VCPKG_TRIPLET --x-install-root="$env:VCPKG_ROOT\installed"
          if ($LASTEXITCODE -ne 0) {
            Get-ChildItem -Path $env:VCPKG_ROOT -Recurse -Filter *.log -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "$($_.FullName):"
              Write-Host "======"
              Get-Content $_.FullName
              Write-Host "======"
            }
            exit $LASTEXITCODE
          }

      - name: Build DaFu Remote for Windows
        shell: pwsh
        run: |
          python .\build.py --flutter --hwcodec --vram

      - name: Prepare release files
        shell: pwsh
        run: |
          $version = '${{ needs.prepare-release.outputs.version }}'
          $installFile = ".\DaFuRemote-$version-install.exe"
          $portableFile = ".\DaFuRemote-$version-portable.exe"
          $legacyPortableFile = ".\DaFuRemotePortable.exe"

          if (-not (Test-Path $installFile)) {
            throw "Expected install artifact not found: $installFile"
          }

          if (Test-Path $legacyPortableFile) {
            Copy-Item -LiteralPath $legacyPortableFile -Destination $portableFile -Force
          } else {
            Copy-Item -LiteralPath $installFile -Destination $portableFile -Force
          }

          Get-Item $installFile, $portableFile | Select-Object Name, Length, LastWriteTime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaFuRemote-windows-x64
          path: |
            DaFuRemote-${{ needs.prepare-release.outputs.version }}-install.exe
            DaFuRemote-${{ needs.prepare-release.outputs.version }}-portable.exe

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: |
            DaFuRemote-${{ needs.prepare-release.outputs.version }}-install.exe
            DaFuRemote-${{ needs.prepare-release.outputs.version }}-portable.exe

  build-macos-arm64:
    name: macOS ARM64
    needs: prepare-release
    runs-on: macos-15
    env:
      MAC_RUST_VERSION: "1.81"
      FLUTTER_VERSION: "3.24.5"
      CARGO_EXPAND_VERSION: "1.0.95"
      FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use crates.io sparse index in CI
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path(".cargo/config.toml")
          text = path.read_text(encoding="utf-8").replace("\r\n", "\n")
          text = text.replace(
              '[source.crates-io]\nreplace-with = "rsproxy-sparse"\n\n[source.rsproxy-sparse]\nregistry = "sparse+https://rsproxy.cn/index/"\n',
              '[source.crates-io]\nregistry = "sparse+https://index.crates.io/"\n',
          )
          path.write_text(text, encoding="utf-8", newline="\n")
          print(path.read_text(encoding="utf-8"))
          PY

      - name: Install build runtime
        shell: bash
        run: |
          brew install llvm create-dmg
          if ! command -v pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

      - name: Install NASM 2.16.x
        shell: bash
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          PATCH_FILE="${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if git apply --check "${PATCH_FILE}" >/dev/null 2>&1; then
            git apply "${PATCH_FILE}"
            echo "Applied Flutter dropdown menu patch."
          else
            echo "Flutter dropdown menu patch is not needed or not compatible with Flutter ${{ env.FLUTTER_VERSION }}, skipping."
          fi

      - name: Work around Flutter scheduler issue
        shell: bash
        run: |
          cd "$(dirname "$(which flutter)")"
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-darwin
          components: rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-arm64

      - name: Install Flutter Rust Bridge codegen
        shell: bash
        run: |
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked
          pushd flutter
          flutter pub get
          popd

      - name: Generate Flutter Rust Bridge bindings
        shell: bash
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! "$VCPKG_ROOT/vcpkg" install --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r file; do
              echo "${file}:"
              echo "======"
              cat "${file}"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-arm64-osx-rel-out.log" || true

      - name: Build DaFu Remote for Apple Silicon
        shell: bash
        run: |
          MIN_MACOS_VERSION="12.3"
          sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
          sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
          sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
          sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          python3 ./build.py --flutter --hwcodec --unix-file-copy-paste --screencapturekit

      - name: Prepare app bundle alias
        shell: bash
        run: |
          APP_DIR="./flutter/build/macos/Build/Products/Release"
          if [[ -d "${APP_DIR}/DaFu Remote.app" && ! -e "${APP_DIR}/RustDesk.app" ]]; then
            ln -s "DaFu Remote.app" "${APP_DIR}/RustDesk.app"
          fi
          if [[ -d "${APP_DIR}/RustDesk.app" && ! -e "${APP_DIR}/DaFu Remote.app" ]]; then
            ln -s "RustDesk.app" "${APP_DIR}/DaFu Remote.app"
          fi
          ls -la "${APP_DIR}"

      - name: Create unsigned DMG
        shell: bash
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          APP_DIR="./flutter/build/macos/Build/Products/Release"
          APP_NAME="DaFu Remote.app"
          create-dmg \
            --volname "DaFu Remote Installer" \
            --icon "${APP_NAME}" 200 190 \
            --hide-extension "${APP_NAME}" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "DaFuRemote-${VERSION}-macos-arm64.dmg" \
            "${APP_DIR}/${APP_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaFuRemote-macos-arm64
          path: DaFuRemote-${{ needs.prepare-release.outputs.version }}-macos-arm64.dmg

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: DaFuRemote-${{ needs.prepare-release.outputs.version }}-macos-arm64.dmg

  build-android-arm64:
    name: Android ARM64
    needs: prepare-release
    runs-on: ubuntu-24.04
    env:
      RUST_VERSION: "1.75"
      FLUTTER_VERSION: "3.24.5"
      CARGO_EXPAND_VERSION: "1.0.95"
      FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
      CARGO_NDK_VERSION: "3.1.2"
      NDK_VERSION: "r28c"
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc-multilib \
            git \
            g++ \
            g++-multilib \
            libasound2-dev \
            libc6-dev \
            libclang-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-3-dev \
            libpam0g-dev \
            libpulse-dev \
            libunwind-dev \
            libva-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            llvm-dev \
            nasm \
            ninja-build \
            openjdk-17-jdk-headless \
            pkg-config \
            tree \
            unzip \
            wget

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch hwcodec externals
        shell: bash
        run: |
          externals_path="./vendor/hwcodec/externals"
          if [[ -d "${externals_path}/MediaSDK_22.5.4" ]]; then
            echo "hwcodec externals already present."
            exit 0
          fi
          rm -rf "${externals_path}"
          git clone --depth 1 https://github.com/rustdesk-org/externals.git "${externals_path}"

      - name: Use crates.io sparse index in CI
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path(".cargo/config.toml")
          text = path.read_text(encoding="utf-8").replace("\r\n", "\n")
          text = text.replace(
              '[source.crates-io]\nreplace-with = "rsproxy-sparse"\n\n[source.rsproxy-sparse]\nregistry = "sparse+https://rsproxy.cn/index/"\n',
              '[source.crates-io]\nregistry = "sparse+https://index.crates.io/"\n',
          )
          path.write_text(text, encoding="utf-8", newline="\n")
          print(path.read_text(encoding="utf-8"))
          PY

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          PATCH_FILE="${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if git apply --check "${PATCH_FILE}" >/dev/null 2>&1; then
            git apply "${PATCH_FILE}"
            echo "Applied Flutter dropdown menu patch."
          else
            echo "Flutter dropdown menu patch is not needed or not compatible with Flutter ${{ env.FLUTTER_VERSION }}, skipping."
          fi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install Flutter Rust Bridge codegen
        shell: bash
        run: |
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked
          pushd flutter
          flutter pub get
          popd

      - name: Patch uni_links Android compileSdk in CI
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          patched = []
          patterns = (
              ".pub-cache/hosted/*/uni_links-*/android/build.gradle",
              ".pub-cache/hosted/*/uni_links-*/android/build.gradle.kts",
          )

          for pattern in patterns:
              for path in Path.home().glob(pattern):
                  text = path.read_text(encoding="utf-8")
                  updated = text.replace("compileSdkVersion 28", "compileSdkVersion 34")
                  updated = updated.replace("targetSdkVersion 28", "targetSdkVersion 34")
                  if updated != text:
                      path.write_text(updated, encoding="utf-8", newline="\n")
                      patched.append(str(path))

          if not patched:
              print("uni_links Android build.gradle not found or did not need patching, skipping.")
          else:
              print("Patched:")
              for item in patched:
                  print(item)
          PY

      - name: Generate Flutter Rust Bridge bindings
        shell: bash
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-arm64
          key: aarch64-linux-android

      - name: Install vcpkg dependencies
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if ! ./flutter/build_android_deps.sh arm64-v8a; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r file; do
              echo "${file}:"
              echo "======"
              cat "${file}"
              echo "======"
              echo ""
            done
            exit 1
          fi

      - name: Build Rust library
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}" --locked
          ./flutter/ndk_arm64.sh
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

      - name: Build APK
        shell: bash
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./flutter/android/gradle.properties
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./flutter/android/app/build.gradle
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" ./flutter/android/app/src/main/jniLibs/arm64-v8a/
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
          pushd flutter
          flutter build apk --release --target-platform android-arm64 --split-per-abi
          popd
          mv ./flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "./DaFuRemote-${VERSION}-android-arm64.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaFuRemote-android-arm64
