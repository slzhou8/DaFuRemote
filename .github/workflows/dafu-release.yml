name: DaFu Remote Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional release tag. Leave empty to use v<version> from Cargo.toml.
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: dafu-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-24.04
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(python3 -c "from pathlib import Path; print(next(line.split('=')[1].strip().strip('\"') for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines() if line.startswith('version')))" )"
          TAG_NAME="${{ inputs.tag_name }}"
          if [[ -z "${TAG_NAME}" ]]; then
            TAG_NAME="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create or update release shell
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: DaFu Remote ${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build-windows-x64:
    name: Windows x64
    needs: prepare-release
    uses: ./.github/workflows/dafu-windows-x64.yml
    with:
      upload_release: true
      tag_name: ${{ needs.prepare-release.outputs.tag_name }}

  build-macos-arm64:
    name: macOS ARM64
    needs: prepare-release
    uses: ./.github/workflows/dafu-macos-arm64.yml
    with:
      upload_release: true
      tag_name: ${{ needs.prepare-release.outputs.tag_name }}

  build-android-arm64:
    name: Android ARM64
    needs: prepare-release
    uses: ./.github/workflows/dafu-android-arm64.yml
    with:
      upload_release: true
      tag_name: ${{ needs.prepare-release.outputs.tag_name }}
