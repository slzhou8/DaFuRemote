name: DaFu Remote Android ARM64

on:
  workflow_call:
    inputs:
      upload_release:
        type: boolean
        required: false
        default: false
      tag_name:
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      upload_release:
        type: boolean
        description: Upload the built APK to a GitHub Release
        required: false
        default: false
      tag_name:
        description: Release tag used when upload_release=true
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "[0-9]*"

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_NDK_VERSION: "3.1.2"
  NDK_VERSION: "r28c"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: dafu-android-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dafu-android-arm64:
    name: Build DaFu Remote Android ARM64
    runs-on: ubuntu-24.04

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc-multilib \
            git \
            g++ \
            g++-multilib \
            libasound2-dev \
            libc6-dev \
            libclang-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-3-dev \
            libpam0g-dev \
            libpulse-dev \
            libunwind-dev \
            libva-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            llvm-dev \
            nasm \
            ninja-build \
            openjdk-17-jdk-headless \
            pkg-config \
            tree \
            unzip \
            wget

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(python3 -c "from pathlib import Path; print(next(line.split('=')[1].strip().strip('\"') for line in Path('Cargo.toml').read_text(encoding='utf-8').splitlines() if line.startswith('version')))" )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          if [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]]; then
            git apply "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          fi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg with GitHub Actions cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install Flutter Rust Bridge codegen
        shell: bash
        run: |
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked
          pushd flutter
          flutter pub get
          popd

      - name: Generate Flutter Rust Bridge bindings
        shell: bash
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-arm64
          key: aarch64-linux-android

      - name: Install vcpkg dependencies
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if ! ./flutter/build_android_deps.sh arm64-v8a; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r file; do
              echo "${file}:"
              echo "======"
              cat "${file}"
              echo "======"
              echo ""
            done
            exit 1
          fi

      - name: Build Rust library
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}" --locked
          ./flutter/ndk_arm64.sh
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

      - name: Build APK
        shell: bash
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./flutter/android/gradle.properties
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./flutter/android/app/build.gradle
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" ./flutter/android/app/src/main/jniLibs/arm64-v8a/
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
          pushd flutter
          flutter build apk --release --target-platform android-arm64 --split-per-abi
          popd
          mv ./flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "./DaFuRemote-${{ steps.version.outputs.version }}-android-arm64.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaFuRemote-android-arm64
          path: DaFuRemote-${{ steps.version.outputs.version }}-android-arm64.apk

      - name: Publish release asset
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (inputs.upload_release == true && inputs.tag_name != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: DaFuRemote-${{ steps.version.outputs.version }}-android-arm64.apk
